services:

  mysql:
    image: mysql:8.0
    container_name: altokepay-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: altokepay
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: altokepay-backend
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ""
      APP_URL: "http://localhost:8080"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: altokepay
      DB_USERNAME: root
      DB_PASSWORD: ""
      SANCTUM_STATEFUL_DOMAINS: "localhost:5173,localhost:8080"
    volumes:
      - ./backend:/var/www/html:cached
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - NODE_ENV=development
    container_name: altokepay-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8080/api"
    volumes:
      - .:/app:cached
      - /app/node_modules
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: altokepay-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: "100M"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
